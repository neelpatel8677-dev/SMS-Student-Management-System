<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard | SMS Portal</title>
  <link rel="icon" type="image/png" href="SMS Logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --accent:    #2563eb;
      --accent-h:  #1d4ed8;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --error:     #f85149;
      --success:   #3fb950;
      --warning:   #e3b341;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .brand-icon {
      font-size: 1.5rem;
    }

    .brand-name {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .logout-btn {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.3);
      color: var(--error);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }

    .logout-btn:hover {
      background: var(--error);
      color: #fff;
    }

    main {
      padding: 2rem;
      max-width: 1250px;
      width: 100%;
      margin: 0 auto;
      flex: 1;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .stat-val {
      font-size: 2rem;
      font-weight: 700;
    }

    .tabs {
      display: flex;
      gap: 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }

    .tab {
      background: none;
      border: none;
      color: var(--muted);
      padding: 0.75rem 1rem;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 500;
      border-bottom: 2px solid transparent;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      overflow-x: auto;
    }

    .panel.active {
      display: block;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      text-align: left;
      min-width: 800px;
    }

    th, td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }

    th {
      color: var(--muted);
      font-weight: 500;
    }

    .control-links {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .badge-btn {
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.2s;
    }

    .badge-btn.attendance { background: rgba(37,99,235,0.1); border-color: rgba(37,99,235,0.3); color: #60a5fa; }
    .badge-btn.fees { background: rgba(63,185,80,0.1); border-color: rgba(63,185,80,0.3); color: #4ade80; }
    .badge-btn.results { background: rgba(227,179,65,0.1); border-color: rgba(227,179,65,0.3); color: #fbbf24; }

    .badge-btn:hover {
      opacity: 0.85;
    }

    .action-btn {
      background: none;
      border: none;
      color: var(--error);
      cursor: pointer;
      font-weight: 500;
    }

    .action-btn:hover {
      text-decoration: underline;
    }

    .fee-status {
      text-transform: capitalize;
      font-weight: 600;
    }
    .fee-status.paid { color: var(--success); }
    .fee-status.pending { color: var(--warning); }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <span class="brand-icon">🛡️</span>
      <div class="brand-name">SMS Super Admin Control</div>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </header>

  <main>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Faculty</div>
        <div class="stat-val" id="facultyCount">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Students</div>
        <div class="stat-val" id="studentCount">-</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('faculty')">Manage Faculty</button>
      <button class="tab" onclick="switchTab('students')">Manage Students</button>
    </div>

    <!-- Faculty Management View -->
    <div id="facultyPanel" class="panel active">
      <h2>Registered Faculty Members</h2>
      <table id="facultyTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="4">Loading data fields...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Student Management View -->
    <div id="studentsPanel" class="panel">
      <h2>Registered Students & Activities Control</h2>
      <table id="studentsTable">
        <thead>
          <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Email</th>
            <th>Course & Branch</th>
            <th>Fee Status</th>
            <th>Deep Performance Tracking Links</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="7">Loading data fields...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    const API_URL = "https://sms-student-management-system-1.onrender.com";
    const token = localStorage.getItem("token");

    if (!token) {
      window.location.href = "login.html";
    }

    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }

    function switchTab(target) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

      if (target === 'faculty') {
        document.querySelector('[onclick="switchTab(\'faculty\')"]').classList.add('active');
        document.getElementById('facultyPanel').classList.add('active');
      } else {
        document.querySelector('[onclick="switchTab(\'students\')"]').classList.add('active');
        document.getElementById('studentsPanel').classList.add('active');
      }
    }

    async function fetchStats() {
      try {
        const fRes = await fetch(`${API_URL}/api/faculty/count`, { headers: { "Authorization": `Bearer ${token}` } });
        const sRes = await fetch(`${API_URL}/api/students/count`, { headers: { "Authorization": `Bearer ${token}` } });
        
        if(fRes.ok) document.getElementById('facultyCount').textContent = (await fRes.json()).total;
        if(sRes.ok) document.getElementById('studentCount').textContent = (await sRes.json()).total;
      } catch (err) { console.error("Stats fetching error:", err); }
    }

    async function loadFaculty() {
      try {
        const res = await fetch(`${API_URL}/api/faculty`, { headers: { "Authorization": `Bearer ${token}` } });
        if (!res.ok) throw new Error();
        const data = await res.json();
        
        const tbody = document.querySelector('#facultyTable tbody');
        tbody.innerHTML = data.length ? data.map(f => `
          <tr>
            <td>${f.name}</td>
            <td>${f.email}</td>
            <td>${f.department || '—'}</td>
            <td><button class="action-btn" onclick="deleteRecord('faculty', '${f._id}')">Remove</button></td>
          </tr>
        `).join('') : `<tr><td colspan="4">No faculty entries found.</td></tr>`;
      } catch (err) {
        document.querySelector('#facultyTable tbody').innerHTML = `<tr><td colspan="4" style="color:var(--error)">Error loading rows.</td></tr>`;
      }
    }

    async function loadStudents() {
      try {
        const res = await fetch(`${API_URL}/api/students`, { headers: { "Authorization": `Bearer ${token}` } });
        if (!res.ok) throw new Error();
        const data = await res.json();
        
        const tbody = document.querySelector('#studentsTable tbody');
        tbody.innerHTML = data.length ? data.map(s => `
          <tr>
            <td>${s.rollNo}</td>
            <td><strong>${s.name}</strong></td>
            <td>${s.email}</td>
            <td>${s.course} (${s.branch})</td>
            <td><span class="fee-status ${s.feeStatus}">${s.feeStatus}</span></td>
            <td>
              <div class="control-links">
                <a href="admin-attendance.html?studentId=${s._id}" class="badge-btn attendance">📅 Attendance</a>
                <a href="admin-fees.html?studentId=${s._id}" class="badge-btn fees">💵 Fees</a>
                <a href="admin-results.html?studentId=${s._id}" class="badge-btn results">📝 Results</a>
              </div>
            </td>
            <td><button class="action-btn" onclick="deleteRecord('students', '${s._id}')">Delete</button></td>
          </tr>
        `).join('') : `<tr><td colspan="7">No student entries found.</td></tr>`;
      } catch (err) {
        document.querySelector('#studentsTable tbody').innerHTML = `<tr><td colspan="7" style="color:var(--error)">Error loading rows.</td></tr>`;
      }
    }

    async function deleteRecord(endpoint, id) {
      if (!confirm(`Are you sure you want to completely delete this structural account?`)) return;
      try {
        const res = await fetch(`${API_URL}/api/${endpoint}/${id}`, {
          method: "DELETE",
          headers: { "Authorization": `Bearer ${token}` }
        });
        if (res.ok) {
          fetchStats();
          if (endpoint === 'faculty') loadFaculty();
          else loadStudents();
        } else { alert("Deletion sequence rejected by server."); }
      } catch (err) { console.error(err); }
    }

    window.onload = () => {
      fetchStats();
      loadFaculty();
      loadStudents();
    };
  </script>
</body>
</html>
