<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard | Student Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1c2128;
      --border:    #30363d;
      --accent:    #2563eb;
      --accent-h:  #1d4ed8;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --success:   #3fb950;
      --warning:   #e3b341;
      --danger:    #f85149;
      --purple:    #7c3aed;
      --cyan:      #22d3ee;
    }

    body {
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar Navigation ── */
    .sidebar {
      width: 240px;
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      transition: transform 0.3s ease;
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 1.25rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .brand-icon {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }

    .brand-text { font-size: 0.9rem; font-weight: 700; }
    .brand-sub  { font-size: 0.68rem; color: var(--muted); }

    .nav-section {
      padding: 1rem 0.75rem 0.25rem;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.55rem 0.875rem;
      margin: 0.1rem 0.5rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-decoration: none;
    }

    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: rgba(37,99,235,0.15); color: #93c5fd; }
    .nav-item .nav-icon { font-size: 1rem; width: 20px; text-align: center; }

    .sidebar-footer {
      margin-top: auto;
      padding: 1rem;
      border-top: 1px solid var(--border);
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.5rem;
      border-radius: 8px;
    }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
    }

    .user-name  { font-size: 0.85rem; font-weight: 600; }
    .user-role  { font-size: 0.72rem; color: var(--muted); text-transform: capitalize; }

    .logout-btn {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 0.875rem;
      margin-top: 0.5rem;
      border-radius: 8px;
      font-size: 0.85rem;
      color: var(--danger);
      cursor: pointer;
      background: none; border: none; font-family: inherit;
      width: 100%;
      transition: background 0.15s;
    }

    .logout-btn:hover { background: rgba(248,81,73,0.1); }

    /* ── Main Workspace ── */
    .main {
      margin-left: 240px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Topbar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
    }

    .topbar-left { display: flex; align-items: center; gap: 0.75rem; }

    .hamburger {
      display: none;
      background: none; border: none;
      color: var(--text); font-size: 1.25rem;
      cursor: pointer; padding: 0.25rem;
    }

    .page-title { font-size: 1.1rem; font-weight: 700; }
    .page-sub   { font-size: 0.78rem; color: var(--muted); margin-top: 0.1rem; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge.admin   { background: rgba(37,99,235,0.15); color: #93c5fd; }
    .badge.faculty { background: rgba(124,58,237,0.15); color: #c084fc; }
    .badge.student { background: rgba(63,185,80,0.15); color: #3fb950; }

    /* Content */
    .content { padding: 1.5rem; flex: 1; }

    .welcome-banner {
      background: linear-gradient(135deg, rgba(37,99,235,0.15), rgba(124,58,237,0.1));
      border: 1px solid rgba(37,99,235,0.25);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .welcome-text h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.25rem; }
    .welcome-text p  { font-size: 0.85rem; color: var(--muted); }
    .welcome-emoji   { font-size: 2.5rem; }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: border-color 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }

    .stat-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .stat-card.blue::after   { background: var(--accent); }
    .stat-card.green::after  { background: var(--success); }
    .stat-card.yellow::after { background: var(--warning); }
    .stat-card.purple::after { background: var(--purple); }
    .stat-card.cyan::after   { background: var(--cyan); }

    .stat-icon {
      font-size: 1.5rem;
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }

    .stat-card.blue   .stat-icon { background: rgba(37,99,235,0.15); }
    .stat-card.green  .stat-icon { background: rgba(63,185,80,0.15); }
    .stat-card.yellow .stat-icon { background: rgba(227,179,65,0.15); }
    .stat-card.purple .stat-icon { background: rgba(124,58,237,0.15); }
    .stat-card.cyan   .stat-icon { background: rgba(34,211,238,0.15); }

    .stat-label { font-size: 0.78rem; color: var(--muted); font-weight: 500; }
    .stat-value { font-size: 1.75rem; font-weight: 700; line-height: 1; }
    .stat-sub   { font-size: 0.75rem; color: var(--muted); }

    /* Bottom Panels */
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .panel-title { font-size: 0.9rem; font-weight: 600; }
    .panel-link  { font-size: 0.78rem; color: var(--accent); text-decoration: none; }
    .panel-link:hover { text-decoration: underline; }

    /* Table Styles */
    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th {
      padding: 0.6rem 1.25rem;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    .pill {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 500;
    }

    .pill.paid    { background: rgba(63,185,80,0.15);  color: var(--success); }
    .pill.pending { background: rgba(227,179,65,0.15); color: var(--warning); }

    /* Quick Action Buttons */
    .actions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
    }

    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      padding: 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-decoration: none;
      color: var(--text);
    }

    .action-btn:hover { border-color: var(--accent); background: rgba(37,99,235,0.08); }
    .action-btn .act-icon { font-size: 1.4rem; }
    .action-btn .act-label { font-size: 0.78rem; font-weight: 500; text-align: center; }

    /* Skeleton Loading */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
      height: 1rem;
    }

    @keyframes shimmer { to { background-position: -200% 0; } }

    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
    }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .overlay.show { display: block; }
      .main { margin-left: 0; }
      .hamburger { display: block; }
      .bottom-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .welcome-emoji { display: none; }
    }
  </style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<!-- ── Sidebar ── -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">🎓</div>
    <div>
      <div class="brand-text">SMS Portal</div>
      <div class="brand-sub">Student Management System</div>
    </div>
  </div>

  <div class="nav-section">Main</div>
  <a class="nav-item active" href="index.html">
    <span class="nav-icon">🏠</span> Dashboard
  </a>

  <!-- Admin Navigation Link Block -->
  <div id="adminNav">
    <div class="nav-section">Management</div>
    <a class="nav-item" href="students.html">
      <span class="nav-icon">👨‍🎓</span> Students
    </a>
    <a class="nav-item" href="courses.html">
      <span class="nav-icon">📚</span> Courses
    </a>
    <a class="nav-item" href="attendance.html">
      <span class="nav-icon">📋</span> Attendance
    </a>
    <a class="nav-item" href="fees.html">
      <span class="nav-icon">💰</span> Fees
    </a>
    <a class="nav-item" href="results.html">
      <span class="nav-icon">📊</span> Results
    </a>
    <div class="nav-section">System</div>
    <a class="nav-item" href="settings.html">
      <span class="nav-icon">⚙️</span> Settings
    </a>
  </div>

  <div class="sidebar-footer">
    <div class="user-card">
      <div class="avatar" id="sidebarAvatar">A</div>
      <div>
        <div class="user-name" id="sidebarName">Loading...</div>
        <div class="user-role" id="sidebarRole">Admin</div>
      </div>
    </div>
    <button class="logout-btn" id="logoutBtn">
      🚪 Sign out
    </button>
  </div>
</aside>

<!-- ── Main Workspace ── -->
<div class="main">

  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger" id="hamburger">☰</button>
      <div>
        <div class="page-title">Dashboard</div>
        <div class="page-sub" id="dateLabel">—</div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="badge admin" id="roleBadge">ADMIN</span>
    </div>
  </header>

  <div class="content">

    <div class="welcome-banner">
      <div class="welcome-text">
        <h2 id="welcomeMsg">Welcome back, Admin! 👋</h2>
        <p id="welcomeSub">Here's an overview of your institution today.</p>
      </div>
      <div class="welcome-emoji" id="welcomeEmoji">🛡️</div>
    </div>

    <div class="stats-grid" id="statsGrid"></div>
    <div class="bottom-grid" id="bottomGrid"></div>

  </div>
</div>

<script>
  const API_URL = "https://sms-student-management-system-1.onrender.com"; 

  // 1. Auth Guard & Modular Redirect Check
  const token = localStorage.getItem('token');
  const user  = JSON.parse(localStorage.getItem('user') || '{}');
  if (!token) {
    window.location.href = 'login.html';
  }

  const role = user.role || 'admin';
  const name = user.name || 'Admin User';

  // Redirect Faculty or Student logins directly to their dedicated separated dashboards
  if (role === 'faculty' && !window.location.href.includes('faculty-dashboard.html')) {
    window.location.href = 'faculty-dashboard.html';
  } else if (role === 'student' && !window.location.href.includes('student-dashboard.html')) {
    window.location.href = 'student-dashboard.html';
  }

  // Mobile Menu Drawer
  const sidebar   = document.getElementById('sidebar');
  const overlay   = document.getElementById('overlay');
  const hamburger = document.getElementById('hamburger');

  hamburger.addEventListener('click', () => {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('show');
  });

  overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('show');
  });

  // User Info Setup
  document.getElementById('sidebarAvatar').textContent = name.charAt(0).toUpperCase();
  document.getElementById('sidebarName').textContent   = name;
  document.getElementById('sidebarRole').textContent   = role;

  // Date Setup
  const now = new Date();
  document.getElementById('dateLabel').textContent = now.toLocaleDateString('en-IN', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  // Welcome Message
  const hour = now.getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('welcomeMsg').textContent = `${greeting}, ${name.split(' ')[0]}! 👋`;

  // Sign out
  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.clear();
    window.location.href = 'login.html';
  });

  // API Fetch Helper
  async function apiFetch(endpoint) {
    const userObj = JSON.parse(localStorage.getItem('user') || '{}');
    const res = await fetch(`${API_URL}${endpoint}`, {
      headers: { 
        'Authorization': `Bearer ${token}`,
        'user-id': userObj.id || userObj._id || '' 
      }
    });
    if (res.status === 401) { localStorage.clear(); window.location.href = 'login.html'; }
    return res.json();
  }

  // Load Admin Data Overview
  async function loadAdminDashboard() {
    const statsGrid  = document.getElementById('statsGrid');
    const bottomGrid = document.getElementById('bottomGrid');

    statsGrid.innerHTML = Array(5).fill(`
      <div class="stat-card blue">
        <div class="skeleton" style="width:40px;height:40px;border-radius:10px;"></div>
        <div class="skeleton" style="width:60%;"></div>
        <div class="skeleton" style="width:40%;height:1.75rem;"></div>
      </div>`).join('');

    try {
      const [studentsRes, coursesRes, attendanceRes, feesRes, resultsRes] = await Promise.allSettled([
        apiFetch('/api/students/count'),
        apiFetch('/api/courses/count'),
        apiFetch('/api/attendance/summary'),
        apiFetch('/api/fees/summary'),
        apiFetch('/api/results/summary'),
      ]);

      const students   = studentsRes.status   === 'fulfilled' ? studentsRes.value   : {};
      const courses    = coursesRes.status    === 'fulfilled' ? coursesRes.value    : {};
      const attendance = attendanceRes.status === 'fulfilled' ? attendanceRes.value : {};
      const fees       = feesRes.status       === 'fulfilled' ? feesRes.value       : {};
      const results    = resultsRes.status    === 'fulfilled' ? resultsRes.value    : {};

      statsGrid.innerHTML = `
        <div class="stat-card blue">
          <div class="stat-icon">👨‍🎓</div>
          <div class="stat-label">Total Students</div>
          <div class="stat-value">${students.total ?? '—'}</div>
          <div class="stat-sub">${students.newThisMonth ?? 0} joined this month</div>
        </div>
        <div class="stat-card purple">
          <div class="stat-icon">📚</div>
          <div class="stat-label">Courses</div>
          <div class="stat-value">${courses.total ?? '—'}</div>
          <div class="stat-sub">${courses.active ?? 0} active</div>
        </div>
        <div class="stat-card green">
          <div class="stat-icon">📋</div>
          <div class="stat-label">Avg Attendance</div>
          <div class="stat-value">${attendance.avgPercent ?? '—'}%</div>
          <div class="stat-sub">Today: ${attendance.presentToday ?? 0} present</div>
        </div>
        <div class="stat-card yellow">
          <div class="stat-icon">💰</div>
          <div class="stat-label">Fees Collected</div>
          <div class="stat-value">₹${fees.collected ?? '—'}</div>
          <div class="stat-sub">${fees.pending ?? 0} pending</div>
        </div>
        <div class="stat-card cyan">
          <div class="stat-icon">📊</div>
          <div class="stat-label">Avg Result</div>
          <div class="stat-value">${results.avgScore ?? '—'}%</div>
          <div class="stat-sub">${results.passed ?? 0} passed this term</div>
        </div>
      `;

      let recentStudents = [];
      try {
        const data = await apiFetch('/api/students?limit=5&sort=createdAt');
        recentStudents = data.students ?? data ?? [];
      } catch(_) {}

      const tableRows = recentStudents.length
        ? recentStudents.map(s => `
            <tr>
              <td style="font-weight:600">${s.name ?? '—'}</td>
              <td>${s.rollNo ?? '—'}</td>
              <td>${s.course ?? '—'}</td>
              <td><span class="pill ${s.feeStatus === 'paid' ? 'paid' : 'pending'}">${s.feeStatus ?? 'pending'}</span></td>
            </tr>`).join('')
        : `<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:2rem;">No student data yet</td></tr>`;

      bottomGrid.innerHTML = `
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Recent Students</span>
            <a class="panel-link" href="students.html">View all →</a>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Roll No</th>
                  <th>Course</th>
                  <th>Fees</th>
                </tr>
              </thead>
              <tbody>${tableRows}</tbody>
            </table>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Quick Actions</span>
          </div>
          <div class="actions-grid">
            <a class="action-btn" href="students.html?action=add">
              <span class="act-icon">➕</span>
              <span class="act-label">Add Student</span>
            </a>
            <a class="action-btn" href="attendance.html">
              <span class="act-icon">📋</span>
              <span class="act-label">Mark Attendance</span>
            </a>
            <a class="action-btn" href="fees.html">
              <span class="act-icon">💰</span>
              <span class="act-label">Manage Fees</span>
            </a>
            <a class="action-btn" href="results.html">
              <span class="act-icon">📊</span>
              <span class="act-label">Upload Results</span>
            </a>
          </div>
        </div>`;

    } catch (err) {
      console.error('Admin dashboard error:', err);
    }
  }

  loadAdminDashboard();
</script>
</body>
</html>
